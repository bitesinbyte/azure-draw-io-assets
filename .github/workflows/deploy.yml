name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/ui/package-lock.json

      - name: Install dependencies
        working-directory: src/ui
        run: npm ci

      - name: Copy SVGs to public/icons
        run: |
          mkdir -p src/ui/public/icons
          cp src/sync-assets/img/*.svg src/ui/public/icons/

      - name: Copy azure_latest.xml to public
        run: cp src/sync-assets/assets/azure_latest.xml src/ui/public/azure_latest.xml

      - name: Generate icons metadata
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const dir = 'src/ui/public/icons';
          const files = fs.readdirSync(dir).filter(f => f.endsWith('.svg')).sort();
          const icons = files.map(f => {
            const match = f.match(/^(\d+)-icon-service-(.+)\.svg$/);
            if (!match) return null;
            const name = match[2].replace(/-/g, ' ').trim();
            return { id: match[1], name, file: f };
          }).filter(Boolean);
          const outPath = 'src/ui/app/data/icons.json';
          fs.mkdirSync(path.dirname(outPath), { recursive: true });
          fs.writeFileSync(outPath, JSON.stringify(icons, null, 2));
          console.log('Generated', icons.length, 'icon entries');
          "

      - name: Build Next.js
        working-directory: src/ui
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/ui/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
